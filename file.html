<!-- Story Modal -->
<div class="story-modal" id="storyModal">
  <div class="story-modal__overlay"></div>
  <div class="story-modal__content">
    <button class="story-modal__close" id="closeModal">&times;</button>
    <div class="story-modal__image">
      <img id="modalImage" src="" alt="Collection item image">
    </div>
    <div class="story-modal__text">
      <h2 id="modalTitle">The Story</h2>
      <p id="modalStory"></p>
      <div class="story-modal__details">
        <div class="detail-item">
          <span class="detail-label">Material</span>
          <span class="detail-value" id="modalMaterial"></span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Inspiration</span>
          <span class="detail-value" id="modalInspiration"></span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Collection</span>
          <span class="detail-value" id="modalCollection"></span>
        </div>
      </div>
      <button class="add-to-cart modal-cta">Add to Cart</button>
    </div>
  </div>
</div>
